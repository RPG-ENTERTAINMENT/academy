<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>歌詞カメラ</title>
<style>
  :root{
    --bg:#0b0c0e;
    --panel:#15171a;
    --line:#2a2d31;
    --accent:#ff5470;
    --text:#eef0f2;
    --sub:#9aa0a6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    overscroll-behavior:none;
  }
  #app{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    height:100%;
    height:100dvh;
  }

  #stage{
    position:relative;
    flex:1;
    background:#000;
    overflow:hidden;
    touch-action:none;
  }
  #video{
    position:absolute; width:2px; height:2px; opacity:0;
    pointer-events:none; top:0; left:0;
  }
  #outputCanvas{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    background:#000;
  }
  #placeholder{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:12px;
    color:var(--sub); text-align:center; padding:24px;
  }
  #placeholder button{
    background:var(--accent); color:#fff; border:none; border-radius:999px;
    padding:14px 28px; font-size:15px; font-weight:600;
  }

  .layerWrap{
    position:absolute;
    display:none;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
    z-index:4;
  }
  .layerWrap.visible{ display:block; }
  .layerFrame{
    position:absolute; inset:-8px;
    border:2px dashed rgba(255,255,255,0.55);
    border-radius:10px;
    display:none;
    pointer-events:none;
  }
  .layerWrap.editing .layerFrame{ display:block; }

  .handleBtn{
    position:absolute;
    width:34px; height:34px; border-radius:50%;
    display:none;
    align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.4);
    touch-action:none;
  }
  .layerWrap.editing .handleBtn{ display:flex; }
  .handleBtn svg{ width:16px; height:16px; fill:#fff; }
  .resizeHandleBtn{ right:-16px; bottom:-16px; background:var(--accent); }

  #overlayWrap{ top:16%; left:50%; transform:translate(-50%,0); width:68%; }
  #overlayViewport{
    width:100%; height:240px; max-height:65vh;
    overflow:hidden; position:relative;
    border-radius:6px;
    box-shadow:0 4px 24px rgba(0,0,0,0.5);
  }
  #overlayImg{
    width:100%; height:auto; display:block;
    pointer-events:none;
    position:relative;
  }

  #memoWrap{ top:60%; left:50%; transform:translate(-50%,0); }
  #memoViewport{
    width:min(75vw, 380px);
    height:130px;
    max-height:65vh;
    overflow:hidden;
    position:relative;
    background:rgba(0,0,0,0.55);
    border-radius:10px;
    padding:10px 14px;
    box-shadow:0 4px 24px rgba(0,0,0,0.4);
  }
  #memoText{
    white-space:pre-wrap;
    word-break:break-word;
    color:#fff;
    font-size:28px;
    font-weight:700;
    line-height:1.4;
    pointer-events:none;
    position:relative;
  }

  .sideControls{
    position:absolute; left:-46px; top:50%; transform:translateY(-50%);
    display:none; flex-direction:column; gap:8px; align-items:center;
  }
  .layerWrap.visible .sideControls{ display:flex; }
  .stackBtn{
    position:static;
    width:34px; height:34px; border-radius:50%;
    background:#3d4147; border:none; color:#fff; padding:0;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.4);
    touch-action:none;
    font-size:18px; font-weight:700; line-height:1;
  }
  .stackBtn.active{ background:var(--accent); }
  .stackBtn svg{ width:16px; height:16px; fill:#fff; }


  #topBar{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 10px;
    background:linear-gradient(rgba(0,0,0,0.55), transparent);
    z-index:5;
  }
  #recTimer{
    background:rgba(0,0,0,0.5);
    padding:6px 12px; border-radius:999px;
    font-size:13px; font-weight:600; letter-spacing:0.3px;
    display:none; align-items:center; gap:6px;
  }
  #recTimer.show{ display:inline-flex; }
  #recDot{
    width:8px; height:8px; border-radius:50%; background:var(--accent);
    animation:blink 1s infinite;
  }
  @keyframes blink{ 50%{opacity:0.2;} }

  .iconBtn{
    background:rgba(0,0,0,0.5);
    border:none; color:#fff; border-radius:999px;
    width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    font-size:16px;
  }

  #controls{
    background:var(--panel);
    border-top:1px solid var(--line);
    padding:12px 16px calc(env(safe-area-inset-bottom,0px) + 12px);
    display:flex; flex-direction:column; gap:10px;
    max-height:46vh;
    overflow-y:auto;
    transition:max-height .25s ease, padding .25s ease;
  }
  #controls.compact{
    max-height:20vh;
    padding-top:8px;
    padding-bottom:calc(env(safe-area-inset-bottom,0px) + 8px);
    position:relative;
    padding-right:104px; /* space for the record button on the right */
  }
  #controls.compact #mainRow{
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);
    margin-top:0;
    gap:0;
  }
  #controls.compact #switchCamBtn,
  #controls.compact #spacer46{
    display:none;
  }
  #controls.compact #layerBtnRow button,
  #controls.compact #layerBtnRow2 button,
  #controls.compact #beautyBtn,
  #controls.compact #bgBlurBtn{
    padding:9px 6px;
    font-size:12px;
  }
  #controls.compact #opacityRow,
  #controls.compact #imgScrollRow,
  #controls.compact #memoOpacityRow,
  #controls.compact #memoFontRow,
  #controls.compact #memoScrollRow,
  #controls.compact #memoColorRow,
  #controls.compact #skinRow,
  #controls.compact #eyeRow,
  #controls.compact #noseRow{
    display:none;
  }

  .row{ display:flex; align-items:center; gap:10px; }
  .row label{ font-size:12px; color:var(--sub); width:64px; flex-shrink:0; }
  input[type=range]{ flex:1; accent-color:var(--accent); }

  #memoColorSwatches{ display:flex; gap:8px; flex-wrap:wrap; flex:1; }
  .colorSwatch{
    width:26px; height:26px; border-radius:50%;
    border:2px solid rgba(255,255,255,0.25);
    padding:0; flex-shrink:0;
  }
  .colorSwatch.selected{ border-color:var(--accent); border-width:3px; }

  #layerBtnRow, #layerBtnRow2{ display:flex; gap:8px; }
  #layerBtnRow button, #layerBtnRow2 button{
    flex:1;
    background:#1f2226; color:var(--text);
    border:1px solid var(--line); border-radius:10px;
    padding:11px 6px; font-size:13px; font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }

  #beautyBtn, #bgBlurBtn{
    background:#1f2226; color:var(--sub);
    border:1px solid var(--line); border-radius:10px;
    padding:10px; font-size:13px; font-weight:600;
  }
  #beautyBtn.active, #bgBlurBtn.active{ color:var(--accent); border-color:var(--accent); }
  #beautyStatus{
    font-size:11px; color:var(--sub); text-align:center;
  }

  #mainRow{
    display:flex; align-items:center; justify-content:center;
    gap:36px;
    margin-top:2px;
  }
  #switchCamBtn{
    background:#1f2226; border:1px solid var(--line);
    color:var(--text); width:46px; height:46px; border-radius:50%;
    font-size:18px;
  }
  #recordBtn{
    width:72px; height:72px; border-radius:50%;
    border:4px solid #fff;
    background:transparent;
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  #recordBtn::after{
    content:"";
    width:56px; height:56px; border-radius:50%;
    background:var(--accent);
    transition:all .15s ease;
  }
  #recordBtn.recording::after{
    width:28px; height:28px; border-radius:8px;
  }
  #spacer46{ width:46px; height:46px; }

  #downloadBar{ display:none; gap:10px; }
  #downloadBar.show{ display:flex; }
  #downloadBar a, #downloadBar button{
    flex:1;
    text-align:center;
    padding:12px; border-radius:10px; font-size:14px; font-weight:600;
    text-decoration:none;
  }
  #downloadLink{ background:var(--accent); color:#fff; }
  #discardBtn{ background:#1f2226; color:var(--sub); border:1px solid var(--line); }

  #fileInput{ display:none; }

  #memoModalBackdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.6);
    display:none; align-items:center; justify-content:center;
    z-index:20; padding:24px;
  }
  #memoModalBackdrop.show{ display:flex; }
  #memoModal{
    background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:16px; width:100%; max-width:420px;
    display:flex; flex-direction:column; gap:12px;
  }
  #memoModal h3{ margin:0; font-size:15px; }
  #memoTextarea{
    width:100%; min-height:110px; resize:vertical;
    background:#0f1113; color:var(--text);
    border:1px solid var(--line); border-radius:10px;
    padding:10px; font-size:16px; line-height:1.5;
    font-family:inherit;
  }
  #memoModalBtns{ display:flex; gap:10px; }
  #memoModalBtns button{
    flex:1; padding:11px; border-radius:10px; font-size:14px; font-weight:600; border:none;
  }
  #memoSaveBtn{ background:var(--accent); color:#fff; }
  #memoCancelBtn{ background:#1f2226; color:var(--sub); border:1px solid var(--line); }
</style>
</head>
<body>
<div id="app">

  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="outputCanvas"></canvas>

    <div id="placeholder">
      <div style="font-size:15px;">カメラへのアクセスを許可してください</div>
      <button id="startCamBtn">カメラを起動</button>
    </div>

    <div id="overlayWrap" class="layerWrap">
      <div id="overlayViewport">
        <img id="overlayImg" src="" alt="lyrics">
      </div>
      <div class="layerFrame"></div>
      <div class="handleBtn resizeHandleBtn" id="imgResizeHandle">
        <svg viewBox="0 0 24 24"><path d="M22 22H16V20H20V16H22V22M2 22V16H4V20H8V22H2M22 2V8H20V4H16V2H22M2 2H8V4H4V8H2V2Z"/></svg>
      </div>
      <div class="sideControls">
        <button type="button" class="stackBtn" id="imgRotateHandle">
          <svg viewBox="0 0 24 24"><path d="M12 6V2L7 7l5 5V8c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        </button>
        <button type="button" class="stackBtn" id="imgScrollBtn">
          <svg id="imgScrollIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button type="button" class="stackBtn" id="imgZoomInBtn">＋</button>
        <button type="button" class="stackBtn" id="imgZoomOutBtn">－</button>
      </div>
    </div>

    <div id="memoWrap" class="layerWrap">
      <div id="memoViewport">
        <div id="memoText"></div>
      </div>
      <div class="layerFrame"></div>
      <div class="handleBtn resizeHandleBtn" id="memoResizeHandle">
        <svg viewBox="0 0 24 24"><path d="M22 22H16V20H20V16H22V22M2 22V16H4V20H8V22H2M22 2V8H20V4H16V2H22M2 2H8V4H4V8H2V2Z"/></svg>
      </div>
      <div class="sideControls">
        <button type="button" class="stackBtn" id="memoRotateHandle">
          <svg viewBox="0 0 24 24"><path d="M12 6V2L7 7l5 5V8c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        </button>
        <button type="button" class="stackBtn" id="memoScrollBtn">
          <svg id="memoScrollIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button type="button" class="stackBtn" id="memoZoomInBtn">＋</button>
        <button type="button" class="stackBtn" id="memoZoomOutBtn">－</button>
      </div>
    </div>

    <div id="topBar">
      <div id="recTimer"><span id="recDot"></span><span id="recTimeText">00:00</span></div>
      <button class="iconBtn" id="infoBtn">?</button>
    </div>
  </div>

  <div id="controls">

    <div class="row" id="opacityRow" style="display:none;">
      <label>画像の濃さ</label>
      <input type="range" id="opacitySlider" min="20" max="100" value="90">
    </div>
    <div class="row" id="imgScrollRow" style="display:none;">
      <label>画像スクロール速度</label>
      <input type="range" id="imgScrollSlider" min="5" max="120" value="5">
    </div>

    <div class="row" id="memoOpacityRow" style="display:none;">
      <label>メモの濃さ</label>
      <input type="range" id="memoOpacitySlider" min="20" max="100" value="55">
    </div>
    <div class="row" id="memoFontRow" style="display:none;">
      <label>文字の大きさ</label>
      <input type="range" id="memoFontSlider" min="14" max="60" value="28">
    </div>
    <div class="row" id="memoScrollRow" style="display:none;">
      <label>スクロール速度</label>
      <input type="range" id="memoScrollSlider" min="5" max="120" value="5">
    </div>
    <div class="row" id="memoColorRow" style="display:none;">
      <label>文字の色</label>
      <div id="memoColorSwatches">
        <button type="button" class="colorSwatch selected" data-color="#ffffff" style="background:#ffffff"></button>
        <button type="button" class="colorSwatch" data-color="#000000" style="background:#000000"></button>
        <button type="button" class="colorSwatch" data-color="#ff3b30" style="background:#ff3b30"></button>
        <button type="button" class="colorSwatch" data-color="#ff9500" style="background:#ff9500"></button>
        <button type="button" class="colorSwatch" data-color="#ffcc00" style="background:#ffcc00"></button>
        <button type="button" class="colorSwatch" data-color="#34c759" style="background:#34c759"></button>
        <button type="button" class="colorSwatch" data-color="#00c7be" style="background:#00c7be"></button>
        <button type="button" class="colorSwatch" data-color="#007aff" style="background:#007aff"></button>
        <button type="button" class="colorSwatch" data-color="#5856d6" style="background:#5856d6"></button>
        <button type="button" class="colorSwatch" data-color="#ff2d55" style="background:#ff2d55"></button>
        <button type="button" class="colorSwatch" data-color="#a2845e" style="background:#a2845e"></button>
        <button type="button" class="colorSwatch" data-color="#8e8e93" style="background:#8e8e93"></button>
      </div>
    </div>

    <div id="layerBtnRow">
      <button id="lyricsBtn">🖼️ 画像を選ぶ</button>
      <button id="imgDeleteBtn" style="display:none;">🗑️ 画像を削除</button>
    </div>
    <div id="layerBtnRow2">
      <button id="memoBtn">📝 メモを追加</button>
      <button id="memoDeleteBtn" style="display:none;">🗑️ 文を削除</button>
    </div>

    <button id="beautyBtn">✨ 美顔：オフ</button>
    <button id="bgBlurBtn">🌫️ 背景ぼかし：オフ</button>
    <div id="beautyStatus"></div>

    <div class="row" id="skinRow" style="display:none;">
      <label>肌の滑らかさ</label>
      <input type="range" id="skinSlider" min="0" max="100" value="40">
    </div>
    <div class="row" id="eyeRow" style="display:none;">
      <label>目の大きさ</label>
      <input type="range" id="eyeSlider" min="-100" max="100" value="15">
    </div>
    <div class="row" id="noseRow" style="display:none;">
      <label>鼻の大きさ</label>
      <input type="range" id="noseSlider" min="-100" max="100" value="-15">
    </div>


    <input type="file" id="fileInput" accept="image/*">

    <div id="mainRow">
      <button id="switchCamBtn">🔄</button>
      <button id="recordBtn"></button>
      <div id="spacer46"></div>
    </div>

    <div id="downloadBar">
      <a id="downloadLink" href="#" download="movie.mp4">動画を保存</a>
      <button id="discardBtn">削除してやり直す</button>
    </div>

  </div>
</div>

<div id="memoModalBackdrop">
  <div id="memoModal">
    <h3 id="memoModalTitle">メモを追加</h3>
    <textarea id="memoTextarea" placeholder="歌詞やメモを入力..."></textarea>
    <div id="memoModalBtns">
      <button id="memoCancelBtn">キャンセル</button>
      <button id="memoSaveBtn">保存</button>
    </div>
  </div>
</div>

<script>
(function(){
  const video = document.getElementById('video');
  const canvas = document.getElementById('outputCanvas');
  const ctx = canvas.getContext('2d', {willReadFrequently:true});
  const placeholder = document.getElementById('placeholder');
  const startCamBtn = document.getElementById('startCamBtn');
  const switchCamBtn = document.getElementById('switchCamBtn');
  const recordBtn = document.getElementById('recordBtn');
  const recTimer = document.getElementById('recTimer');
  const recTimeText = document.getElementById('recTimeText');

  const lyricsBtn = document.getElementById('lyricsBtn');
  const imgDeleteBtn = document.getElementById('imgDeleteBtn');
  const fileInput = document.getElementById('fileInput');
  const overlayWrap = document.getElementById('overlayWrap');
  const overlayImg = document.getElementById('overlayImg');
  const overlayViewport = document.getElementById('overlayViewport');
  const imgResizeHandle = document.getElementById('imgResizeHandle');
  const imgRotateHandle = document.getElementById('imgRotateHandle');
  const imgZoomInBtn = document.getElementById('imgZoomInBtn');
  const imgZoomOutBtn = document.getElementById('imgZoomOutBtn');
  const opacityRow = document.getElementById('opacityRow');
  const opacitySlider = document.getElementById('opacitySlider');
  const imgScrollRow = document.getElementById('imgScrollRow');
  const imgScrollSlider = document.getElementById('imgScrollSlider');
  const imgScrollBtn = document.getElementById('imgScrollBtn');
  const imgScrollIcon = document.getElementById('imgScrollIcon');

  const memoBtn = document.getElementById('memoBtn');
  const memoDeleteBtn = document.getElementById('memoDeleteBtn');
  const memoWrap = document.getElementById('memoWrap');
  const memoText = document.getElementById('memoText');
  const memoViewport = document.getElementById('memoViewport');
  const memoResizeHandle = document.getElementById('memoResizeHandle');
  const memoRotateHandle = document.getElementById('memoRotateHandle');
  const memoOpacityRow = document.getElementById('memoOpacityRow');
  const memoOpacitySlider = document.getElementById('memoOpacitySlider');
  const memoFontRow = document.getElementById('memoFontRow');
  const memoFontSlider = document.getElementById('memoFontSlider');
  const memoScrollRow = document.getElementById('memoScrollRow');
  const memoScrollSlider = document.getElementById('memoScrollSlider');
  const memoColorRow = document.getElementById('memoColorRow');
  const memoColorSwatches = document.querySelectorAll('.colorSwatch');
  const memoScrollBtn = document.getElementById('memoScrollBtn');
  const memoZoomInBtn = document.getElementById('memoZoomInBtn');
  const memoZoomOutBtn = document.getElementById('memoZoomOutBtn');
  const memoScrollIcon = document.getElementById('memoScrollIcon');

  const memoModalBackdrop = document.getElementById('memoModalBackdrop');
  const memoModalTitle = document.getElementById('memoModalTitle');
  const memoTextarea = document.getElementById('memoTextarea');
  const memoSaveBtn = document.getElementById('memoSaveBtn');
  const memoCancelBtn = document.getElementById('memoCancelBtn');

  const controlsEl = document.getElementById('controls');
  const beautyBtn = document.getElementById('beautyBtn');
  const bgBlurBtn = document.getElementById('bgBlurBtn');
  const beautyStatus = document.getElementById('beautyStatus');
  const skinRow = document.getElementById('skinRow');
  const skinSlider = document.getElementById('skinSlider');
  const eyeRow = document.getElementById('eyeRow');
  const eyeSlider = document.getElementById('eyeSlider');
  const noseRow = document.getElementById('noseRow');
  const noseSlider = document.getElementById('noseSlider');
  const downloadBar = document.getElementById('downloadBar');
  const downloadLink = document.getElementById('downloadLink');
  const discardBtn = document.getElementById('discardBtn');
  const infoBtn = document.getElementById('infoBtn');

  let stream = null;
  let facingMode = 'user';
  let mediaRecorder = null;
  let chunks = [];
  let recording = false;
  let manualCompact = false;
  let timerInterval = null;
  let startTime = 0;
  let hasImage = false;
  let hasMemo = false;
  let manualShow = false;
  let recordedUrl = null;
  let imgRotation = 0;
  let memoRotation = 0;
  let imgScale = 1;
  let memoScale = 1;

  let beautyEnabled = false;
  let skinStrengthVal = 40, eyeStrengthVal = 15, noseStrengthVal = -15;
  let faceLandmarker = null;
  let faceLandmarkerLoading = false;
  let bgBlurEnabled = false;
  let imageSegmenter = null;
  let imageSegmenterLoading = false;
  const segMaskCanvas = document.createElement('canvas');
  const segMaskCtx = segMaskCanvas.getContext('2d');
  const blurCanvas = document.createElement('canvas');
  const blurCtx = blurCanvas.getContext('2d');
  let cropSx = 0, cropSy = 0, cropSw = 0, cropSh = 0;
  let renderLoopStarted = false;

  const FACE_OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
  const LEFT_EYE_IDX = [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246];
  const RIGHT_EYE_IDX = [263,249,390,373,374,380,381,382,362,398,384,385,386,387,388,466];
  const MOUTH_BOX_IDX = [61,291,0,17];

  function isLandscapeNow(){
    return window.matchMedia && window.matchMedia('(orientation: landscape)').matches;
  }
  function applyCanvasDimensions(){
    if(recording) return; // don't resize while actively recording — keep the recorded clip's aspect ratio stable
    if(!video.videoWidth || !video.videoHeight) return;
    if(isLandscapeNow()){
      canvas.width = 1280;
      canvas.height = 720;
    } else {
      // Match the visible stage's aspect ratio so the CSS (object-fit:cover)
      // doesn't crop further — a mismatched aspect made the preview look zoomed in.
      const stageEl = document.getElementById('stage');

      } else {
        canvas.width = 720;
        canvas.height = 1280;
      }
    }

  function drawVideoCover(){
    const vw = video.videoWidth, vh = video.videoHeight;
    if(!vw || !vh) return;
    const cw = canvas.width, ch = canvas.height;
    const videoRatio = vw / vh;
    const canvasRatio = cw / ch;
    let sx, sy, sw, sh;
    if(videoRatio > canvasRatio){
      sh = vh; sw = vh * canvasRatio; sx = (vw - sw) / 2; sy = 0;
    } else {
      sw = vw; sh = vw / canvasRatio; sx = 0; sy = (vh - sh) / 2;
    }
    cropSx = sx; cropSy = sy; cropSw = sw; cropSh = sh;
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cw, ch);

  function applyBackgroundBlur(nowTs){
    if(!imageSegmenter || cropSw<=0 || cropSh<=0) return;
    let result;
    try{ result = imageSegmenter.segmentForVideo(video, nowTs); }catch(e){ return; }
    if(!result || !result.confidenceMasks || !result.confidenceMasks.length){
      if(result && result.close) result.close();
      return;
    }
    try{
      const mask = result.confidenceMasks[result.confidenceMasks.length-1];
      const mw = mask.width, mh = mask.height;
      const data = mask.getAsFloat32Array();
      if(segMaskCanvas.width !== mw || segMaskCanvas.height !== mh){
        segMaskCanvas.width = mw; segMaskCanvas.height = mh;
      }
      const id = segMaskCtx.createImageData(mw, mh);
      const px = id.data;
      for(let i=0;i<mw*mh;i++){
        px[i*4+3] = data[i] > 0.5 ? 255 : Math.round(data[i]*255);
      }
      segMaskCtx.putImageData(id, 0, 0);

      if(blurCanvas.width !== canvas.width || blurCanvas.height !== canvas.height){
        blurCanvas.width = canvas.width; blurCanvas.height = canvas.height;
      }
      blurCtx.clearRect(0,0,blurCanvas.width,blurCanvas.height);
      blurCtx.filter = 'blur(14px)';
      blurCtx.drawImage(video, cropSx, cropSy, cropSw, cropSh, 0, 0, blurCanvas.width, blurCanvas.height);
      blurCtx.filter = 'none';
      blurCtx.globalCompositeOperation = 'destination-out';
      const rx = mw / video.videoWidth, ry = mh / video.videoHeight;
      blurCtx.imageSmoothingEnabled = true;
      blurCtx.drawImage(segMaskCanvas, cropSx*rx, cropSy*ry, cropSw*rx, cropSh*ry, 0, 0, blurCanvas.width, blurCanvas.height);
      blurCtx.globalCompositeOperation = 'source-over';

      ctx.drawImage(blurCanvas, 0, 0);
    }catch(e){ /* skip frame */ }
    if(result.close) result.close();
  }

  function landmarkPoint(landmarks, idx){
    const vx = landmarks[idx].x * video.videoWidth;
    const vy = landmarks[idx].y * video.videoHeight;
    const scaleX = cropSw > 0 ? canvas.width / cropSw : 1;
    const scaleY = cropSh > 0 ? canvas.height / cropSh : 1;
    return { x: (vx - cropSx) * scaleX, y: (vy - cropSy) * scaleY };
  }
  function centerOf(landmarks, idxArr){
    let sx=0, sy=0;
    idxArr.forEach(i=>{ const p = landmarkPoint(landmarks,i); sx+=p.x; sy+=p.y; });
    return { x: sx/idxArr.length, y: sy/idxArr.length };
  }
  function distPt(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
  function boundingBoxFromIndices(landmarks, idxArr, marginRatio){
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    idxArr.forEach(i=>{
      const p = landmarkPoint(landmarks,i);
      if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x;
      if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y;
    });
    const w=maxX-minX, h=maxY-minY;
    const mx=w*marginRatio, my=h*marginRatio;
    return { x:minX-mx, y:minY-my, w:w+mx*2, h:h+my*2 };
  }
  function restoreSharpBox(box){
    const cx = Math.max(0, Math.floor(box.x));
    const cy = Math.max(0, Math.floor(box.y));
    const cw2 = Math.min(Math.ceil(box.w), canvas.width-cx);
    const ch2 = Math.min(Math.ceil(box.h), canvas.height-cy);
    if(cw2<=0||ch2<=0 || cropSw<=0 || cropSh<=0) return;
    const scaleX = cropSw / canvas.width, scaleY = cropSh / canvas.height;
    const vx = cropSx + cx*scaleX;
    const vy = cropSy + cy*scaleY;
    const vw2 = cw2*scaleX;
    const vh2 = ch2*scaleY;
    ctx.drawImage(video, vx, vy, vw2, vh2, cx, cy, cw2, ch2);
  }

  function pinchPunch(cx, cy, radius, strength){
    if(radius<=2) return;
    const x0 = Math.max(0, Math.floor(cx-radius));
    const y0 = Math.max(0, Math.floor(cy-radius));
    const w = Math.min(Math.ceil(radius*2), canvas.width-x0);
    const h = Math.min(Math.ceil(radius*2), canvas.height-y0);
    if(w<=0||h<=0) return;
    let src;
    try{ src = ctx.getImageData(x0,y0,w,h); }catch(e){ return; }
    const dst = ctx.createImageData(w,h);
    const s = src.data, d = dst.data;
    const rcx = cx-x0, rcy = cy-y0;
    for(let j=0;j<h;j++){
      for(let i=0;i<w;i++){
        const dx=i-rcx, dy=j-rcy;
        const distR = Math.sqrt(dx*dx+dy*dy);
        let sx=i, sy=j;
        if(distR<radius && distR>0){
          const dd = distR/radius;
          const t = Math.pow(Math.sin(Math.PI/2*dd), -strength);
          sx = rcx+dx*t; sy = rcy+dy*t;
        }
        const ix = Math.min(w-1,Math.max(0,Math.round(sx)));
        const iy = Math.min(h-1,Math.max(0,Math.round(sy)));
        const si=(iy*w+ix)*4, di=(j*w+i)*4;
        d[di]=s[si]; d[di+1]=s[si+1]; d[di+2]=s[si+2]; d[di+3]=s[si+3];
      }
    }
    ctx.putImageData(dst, x0, y0);
  }

  function horizontalPinch(cx, cy, radiusX, radiusY, strength){
    if(radiusX<=2 || radiusY<=2) return;
    const x0 = Math.max(0, Math.floor(cx-radiusX));
    const y0 = Math.max(0, Math.floor(cy-radiusY));
    const w = Math.min(Math.ceil(radiusX*2), canvas.width-x0);
    const h = Math.min(Math.ceil(radiusY*2), canvas.height-y0);
    if(w<=0||h<=0) return;
    let src;
    try{ src = ctx.getImageData(x0,y0,w,h); }catch(e){ return; }
    const dst = ctx.createImageData(w,h);
    const s = src.data, d = dst.data;
    const rcx = cx-x0, rcy = cy-y0;
    for(let j=0;j<h;j++){
      for(let i=0;i<w;i++){
        const dx=i-rcx, dy=j-rcy;
        const ed = Math.sqrt((dx/radiusX)*(dx/radiusX) + (dy/radiusY)*(dy/radiusY));
        let sx=i;
        if(ed<1 && ed>0){
          const t = Math.pow(Math.sin(Math.PI/2*ed), -strength);
          sx = rcx + dx*t;
        }
        const ix = Math.min(w-1,Math.max(0,Math.round(sx)));
        const iy = j;
        const si=(iy*w+ix)*4, di=(j*w+i)*4;
        d[di]=s[si]; d[di+1]=s[si+1]; d[di+2]=s[si+2]; d[di+3]=s[si+3];
      }
    }
    ctx.putImageData(dst, x0, y0);
  }

  function applySkinSmooth(landmarks, strength){
    if(strength<=0) return;
    const blurPx = 1 + (strength/100)*10;
    ctx.save();
    const path = new Path2D();
    FACE_OVAL.forEach((idx,i)=>{
      const p = landmarkPoint(landmarks, idx);
      if(i===0) path.moveTo(p.x,p.y); else path.lineTo(p.x,p.y);
    });
    path.closePath();
    ctx.clip(path);
    ctx.filter = 'blur(' + blurPx + 'px)';
    ctx.globalAlpha = 0.5 + (strength/100)*0.45;
    ctx.drawImage(canvas, 0, 0);
    ctx.filter = 'none';
    ctx.globalAlpha = 1;
    ctx.restore();
    restoreSharpBox(boundingBoxFromIndices(landmarks, LEFT_EYE_IDX, 0.4));
    restoreSharpBox(boundingBoxFromIndices(landmarks, RIGHT_EYE_IDX, 0.4));
    restoreSharpBox(boundingBoxFromIndices(landmarks, MOUTH_BOX_IDX, 0.5));
  }

  function applyEyeEnlarge(landmarks, sliderVal){
    if(sliderVal === 0) return;
    const s = (sliderVal/100) * 0.6;
    const leftCenter = centerOf(landmarks, LEFT_EYE_IDX);
    const leftWidth = distPt(landmarkPoint(landmarks,33), landmarkPoint(landmarks,133));
    pinchPunch(leftCenter.x, leftCenter.y, leftWidth*1.5, s);
    const rightCenter = centerOf(landmarks, RIGHT_EYE_IDX);
    const rightWidth = distPt(landmarkPoint(landmarks,263), landmarkPoint(landmarks,362));
    pinchPunch(rightCenter.x, rightCenter.y, rightWidth*1.5, s);
  }

  function ellipticalPinch(cx, cy, radiusX, radiusY, strength){
    if(radiusX<=2 || radiusY<=2) return;
    const x0 = Math.max(0, Math.floor(cx-radiusX));
    const y0 = Math.max(0, Math.floor(cy-radiusY));
    const w = Math.min(Math.ceil(radiusX*2), canvas.width-x0);
    const h = Math.min(Math.ceil(radiusY*2), canvas.height-y0);
    if(w<=0||h<=0) return;
    let src;
    try{ src = ctx.getImageData(x0,y0,w,h); }catch(e){ return; }
    const dst = ctx.createImageData(w,h);
    const s = src.data, d = dst.data;
    const rcx = cx-x0, rcy = cy-y0;
    for(let j=0;j<h;j++){
      for(let i=0;i<w;i++){
        const dx=i-rcx, dy=j-rcy;
        const ed = Math.sqrt((dx/radiusX)*(dx/radiusX) + (dy/radiusY)*(dy/radiusY));
        let sx=i, sy=j;
        if(ed<1 && ed>0){
          const t = Math.pow(Math.sin(Math.PI/2*ed), -strength);
          sx = rcx + dx*t;
          sy = rcy + dy*t;
        }
        const ix = Math.min(w-1,Math.max(0,Math.round(sx)));
        const iy = Math.min(h-1,Math.max(0,Math.round(sy)));
        const si=(iy*w+ix)*4, di=(j*w+i)*4;
        d[di]=s[si]; d[di+1]=s[si+1]; d[di+2]=s[si+2]; d[di+3]=s[si+3];
      }
    }
    ctx.putImageData(dst, x0, y0);
  }

  function applyNoseNarrow(landmarks, sliderVal){
    if(sliderVal === 0) return;
    const s = (sliderVal/100) * 0.55;
    const tip = landmarkPoint(landmarks, 4);
    const bridge = landmarkPoint(landmarks, 6);
    const alaL = landmarkPoint(landmarks, 129);
    const alaR = landmarkPoint(landmarks, 358);
    const cx = (alaL.x+alaR.x)/2;
    const cy = (tip.y+bridge.y)/2;
    const radiusX = Math.max(20, distPt(alaL,alaR) * 1.1);
    const radiusY = Math.max(radiusX*1.1, distPt(tip,bridge)*1.6);
    ellipticalPinch(cx, cy, radiusX, radiusY, s);
  }

  function startRenderLoop(){
    if(renderLoopStarted) return;
    renderLoopStarted = true;
    requestAnimationFrame(renderTick);
  }
  function renderTick(nowTs){
    if(video.readyState >= 2 && canvas.width > 0){
      ctx.filter = 'none'; ctx.globalAlpha = 1;
      drawVideoCover();
      if(bgBlurEnabled && imageSegmenter){
        applyBackgroundBlur(nowTs);
      }
      if(beautyEnabled && faceLandmarker){
        try{
          const result = faceLandmarker.detectForVideo(video, nowTs);
          if(result && result.faceLandmarks && result.faceLandmarks.length){
            const lm = result.faceLandmarks[0];
            applySkinSmooth(lm, skinStrengthVal);
            applyEyeEnlarge(lm, eyeStrengthVal);
            applyNoseNarrow(lm, noseStrengthVal);
          }
        }catch(e){ /* skip this frame on error */ }
      }
    }
    requestAnimationFrame(renderTick);
  }

  function getStageRect(){
    return document.getElementById('stage').getBoundingClientRect();
  }

  function attachGestures(wrapEl, targetEl, getScale, setScale, getRotation, setRotation, onTap){
    let mode = null; // 'drag' | 'pinch'
    let startX=0, startY=0, startLeft=0, startTop=0;
    let initialDist=0, initialAngle=0, initialScale=1, initialRotation=0;
    let downX=0, downY=0, downTime=0, moved=false, pressing=false;

    function touchDist(t1,t2){ return Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY); }
    function touchAngle(t1,t2){ return Math.atan2(t2.clientY-t1.clientY, t2.clientX-t1.clientX) * 180/Math.PI; }

    function beginDrag(p){
      pressing = true; moved = false;
      downX = p.clientX; downY = p.clientY; downTime = Date.now();
      mode = 'drag';
      if(!wrapEl.classList.contains('editing')) return;
      const rect = wrapEl.getBoundingClientRect();
      const stageRect = getStageRect();
      startX = p.clientX; startY = p.clientY;
      startLeft = rect.left - stageRect.left;
      startTop = rect.top - stageRect.top;
    }
    function beginPinch(t1, t2){
      mode = 'pinch';
      pressing = false;
      initialDist = touchDist(t1,t2);
      initialAngle = touchAngle(t1,t2);
      initialScale = getScale();
      initialRotation = getRotation();
    }

    function down(e){
      if(e.touches && e.touches.length >= 2){
        e.preventDefault();
        beginPinch(e.touches[0], e.touches[1]);
      } else {
        const p = e.touches ? e.touches[0] : e;
        beginDrag(p);
      }
    }
    function move(e){
      if(mode === 'pinch' && e.touches && e.touches.length >= 2){
        e.preventDefault();
        const t1 = e.touches[0], t2 = e.touches[1];
        const newDist = touchDist(t1,t2);
        const newAngle = touchAngle(t1,t2);
        const scale = Math.max(0.3, Math.min(4, initialScale * (newDist/Math.max(1,initialDist))));
        let rotation = initialRotation + (newAngle - initialAngle);
        rotation = Math.round(rotation / 5) * 5;
        setScale(scale);
        setRotation(rotation);
        targetEl.style.transform = 'rotate(' + rotation + 'deg) scale(' + scale + ')';
      } else if(mode === 'drag'){
        const p = e.touches ? e.touches[0] : e;
        const ddx = p.clientX - downX, ddy = p.clientY - downY;
        if(Math.hypot(ddx, ddy) > 6) moved = true;
        if(wrapEl.classList.contains('editing')){
          e.preventDefault();
          const dx = p.clientX - startX;
          const dy = p.clientY - startY;
          wrapEl.style.left = (startLeft + dx) + 'px';
          wrapEl.style.top = (startTop + dy) + 'px';
          wrapEl.style.transform = 'none';
        }
      }
    }
    function up(e){
      if(mode === 'drag' && pressing && !moved){
        const dt = Date.now() - downTime;
        if(dt < 600 && onTap) onTap();
      }
      if(e.touches && e.touches.length === 1){
        beginDrag(e.touches[0]);
        pressing = false; moved = true;
      } else if(!e.touches || e.touches.length === 0){
        mode = null; pressing = false; moved = false;
      }
    }
    wrapEl.addEventListener('mousedown', down);
    wrapEl.addEventListener('touchstart', down, {passive:false});
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('mouseup', up);
    window.addEventListener('touchend', up, {passive:false});
  }

  attachGestures(overlayWrap, overlayViewport, ()=>imgScale, (v)=>{imgScale=v;}, ()=>imgRotation, (v)=>{imgRotation=v;}, ()=>{ if(hasImage) overlayWrap.classList.toggle('editing'); });
  attachGestures(memoWrap, memoViewport, ()=>memoScale, (v)=>{memoScale=v;}, ()=>memoRotation, (v)=>{memoRotation=v;}, ()=>{ if(hasMemo) memoWrap.classList.toggle('editing'); });

  function attachHandleResize(handleEl, wrapEl, targetEl, getScale, setScale, getRotation){
    let active = false, cx=0, cy=0, startDist=0, initialScale=1;
    function down(e){
      if(!wrapEl.classList.contains('editing')) return;
      e.stopPropagation(); e.preventDefault();
      const p = e.touches ? e.touches[0] : e;
      const rect = wrapEl.getBoundingClientRect();
      cx = rect.left + rect.width/2;
      cy = rect.top + rect.height/2;
      startDist = Math.max(1, Math.hypot(p.clientX-cx, p.clientY-cy));
      initialScale = getScale();
      active = true;
    }
    function move(e){
      if(!active) return;
      e.preventDefault();
      const p = e.touches ? e.touches[0] : e;
      const dist = Math.hypot(p.clientX-cx, p.clientY-cy);
      const scale = Math.max(0.3, Math.min(4, initialScale * (dist/startDist)));
      setScale(scale);
      targetEl.style.transform = 'rotate(' + getRotation() + 'deg) scale(' + scale + ')';
    }
    function up(){ active = false; }
    handleEl.addEventListener('mousedown', down);
    handleEl.addEventListener('touchstart', down, {passive:false});
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('mouseup', up);
    window.addEventListener('touchend', up);
  }

  function attachHandleRotate(handleEl, wrapEl, targetEl, getRotation, setRotation, getScale){
    function stopProp(e){ e.stopPropagation(); }
    function onClick(e){
      e.stopPropagation();
      const rotation = getRotation() + 90;
      setRotation(rotation);
      targetEl.style.transform = 'rotate(' + rotation + 'deg) scale(' + getScale() + ')';
    }
    handleEl.addEventListener('mousedown', stopProp);
    handleEl.addEventListener('touchstart', stopProp, {passive:true});
    handleEl.addEventListener('click', onClick);
  }

  attachHandleResize(imgResizeHandle, overlayWrap, overlayViewport, ()=>imgScale, (v)=>{imgScale=v;}, ()=>imgRotation);
  attachHandleRotate(imgRotateHandle, overlayWrap, overlayViewport, ()=>imgRotation, (v)=>{imgRotation=v;}, ()=>imgScale);
  attachHandleResize(memoResizeHandle, memoWrap, memoViewport, ()=>memoScale, (v)=>{memoScale=v;}, ()=>memoRotation);
  attachHandleRotate(memoRotateHandle, memoWrap, memoViewport, ()=>memoRotation, (v)=>{memoRotation=v;}, ()=>memoScale);


  function pickMimeType(){
    const candidates = [
      'video/mp4;codecs=h264,aac',
      'video/mp4',
      'video/webm;codecs=vp9,opus',
      'video/webm;codecs=vp8,opus',
      'video/webm'
    ];
    for(const c of candidates){
      if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)){
        return c;
      }
    }
    return '';
  }

  recordBtn.addEventListener('click', ()=>{
    if(!stream){ alert('先にカメラを起動してください'); return; }
    if(!recording){ startRecording(); } else { stopRecording(); }
  });

  function startRecording(){
    chunks = [];
    applyCanvasDimensions();
    const mimeType = pickMimeType();
    const canvasStream = canvas.captureStream(30);
    const audioTracks = stream ? stream.getAudioTracks() : [];
    if(audioTracks.length) canvasStream.addTrack(audioTracks[0]);
    try{
      mediaRecorder = mimeType ? new MediaRecorder(canvasStream, {mimeType}) : new MediaRecorder(canvasStream);
    }catch(err){
      mediaRecorder = new MediaRecorder(canvasStream);
    }
    mediaRecorder.ondataavailable = (e)=>{ if(e.data && e.data.size>0) chunks.push(e.data); };
    mediaRecorder.onstop = onRecordingStop;
    mediaRecorder.start();
    recording = true;
    recordBtn.classList.add('recording');
    recTimer.classList.add('show');
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 250);
    updateVisibility();
    switchCamBtn.style.visibility = 'hidden';
    updateControlsCompact();
  }

  function stopRecording(){
    if(mediaRecorder && mediaRecorder.state !== 'inactive'){ mediaRecorder.stop(); }
    recording = false;
    recordBtn.classList.remove('recording');
    recTimer.classList.remove('show');
    clearInterval(timerInterval);
    switchCamBtn.style.visibility = 'visible';
    updateControlsCompact();
    updateVisibility();
    applyCanvasDimensions();
  }

  function updateControlsCompact(){
    controlsEl.classList.toggle('compact', recording || manualCompact);
  }
  canvas.addEventListener('click', ()=>{
    manualCompact = !manualCompact;
    updateControlsCompact();
  });

  function updateTimer(){
    const elapsed = Math.floor((Date.now()-startTime)/1000);
    const m = String(Math.floor(elapsed/60)).padStart(2,'0');
    const s = String(elapsed%60).padStart(2,'0');
    recTimeText.textContent = m+':'+s;
  }

  function onRecordingStop(){
    const mimeType = mediaRecorder.mimeType || 'video/webm';
    const blob = new Blob(chunks, {type:mimeType});
    if(recordedUrl) URL.revokeObjectURL(recordedUrl);
    recordedUrl = URL.createObjectURL(blob);
    const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
    downloadLink.href = recordedUrl;
    downloadLink.download = 'movie.' + ext;
    downloadBar.classList.add('show');
  }

  discardBtn.addEventListener('click', ()=>{
    downloadBar.classList.remove('show');
    if(recordedUrl){ URL.revokeObjectURL(recordedUrl); recordedUrl = null; }
    chunks = [];
  });

  infoBtn.addEventListener('click', ()=>{
    alert('使い方\n1. カメラを起動\n2. 画像を選ぶ／メモを追加（左側のボタンで回転・自動スクロール・拡大縮小ができます）\n3. カメラ画面をタップすると、細かい設定パネルを隠したり表示したりできます\n4. ✨美顔をオンにすると肌の滑らかさ・目の大きさ（小さくも可）・鼻の大きさ（小さくも可）を調整できます（初回オンにした時に美顔モデルを読み込みます）\n5. 赤いボタンで撮影開始 → 画面にだけ表示され、録画には映りません\n6. 撮影中でも画像の変更やメモの編集、自動スクロールの操作ができます\n7. もう一度押して撮影終了 → 動画を保存できます');
  });

  window.addEventListener('load', ()=>{ startCamera(); });
  window.addEventListener('beforeunload', (e)=>{
    if(downloadBar.classList.contains('show')){ e.preventDefault(); e.returnValue=''; }
  });
})();
</script>
